<mat-toolbar color="primary">
  <span>Scrape DB Browser</span>
  <span class="spacer"></span>
  <button mat-button (click)="addPage()" [disabled]="loading" class="add-button" color="accent">
    <mat-icon>add</mat-icon> Add URL
  </button>
  <button mat-icon-button (click)="load()" [disabled]="loading" aria-label="Refresh">
    <mat-icon>refresh</mat-icon>
  </button>
</mat-toolbar>

<div class="content">
  <div class="loading" *ngIf="loading">
    <mat-spinner diameter="36"></mat-spinner>
  </div>

  <p class="error" *ngIf="error && !loading">{{ error }}</p>

  <table mat-table [dataSource]="pages" class="mat-elevation-z2" *ngIf="!loading && !error">
    <ng-container matColumnDef="url">
      <th mat-header-cell *matHeaderCellDef>URL</th>
      <td mat-cell *matCellDef="let page" class="url-cell">{{ page.url }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let page">
        <mat-chip-set>
          <mat-chip [color]="page.htmlPage ? 'primary' : undefined" [highlighted]="!!page.htmlPage">
            {{ page.status }}
          </mat-chip>
        </mat-chip-set>
      </td>
    </ng-container>

    <ng-container matColumnDef="pageKind">
      <th mat-header-cell *matHeaderCellDef>Kind</th>
      <td mat-cell *matCellDef="let page">{{ page.pageKind || '—' }}</td>
    </ng-container>

    <ng-container matColumnDef="htmlPageLength">
      <th mat-header-cell *matHeaderCellDef>HTML length</th>
      <td mat-cell *matCellDef="let page">{{ page.htmlPageLength ?? '—' }}</td>
    </ng-container>

    <ng-container matColumnDef="updated">
      <th mat-header-cell *matHeaderCellDef>Updated</th>
      <td mat-cell *matCellDef="let page">{{ page.meta.updated | date: 'short' }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let page">
        <button mat-icon-button (click)="editPage(page)" aria-label="Edit" color="primary">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button (click)="deletePage(page)" aria-label="Delete" color="warn">
          <mat-icon>delete</mat-icon>
        </button>
        <button mat-button color="primary" (click)="view(page)">View</button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <p *ngIf="!loading && !error && pages.length === 0">No pages in the database yet.</p>
</div>
